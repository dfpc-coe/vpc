name: NPM Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate CHANGELOG
        run: grep -Pzo "### ${{ github.ref_name }}(?s).*?(?=###)" CHANGELOG.md > RELEASE

      - name: Github Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE
