name: Test

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  validate:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint CloudFormation sources
        run: npm run lint

      - name: Run node:test suite
        run: npm test

      - name: Smoke test template module
        run: |
          node --input-type=module <<'EOF'
          import template from './cloudformation/vpc.template.js';

          if (!template || typeof template !== 'object') {
              throw new Error('Template module did not export an object');
          }

          for (const key of ['Description', 'Parameters', 'Resources', 'Outputs']) {
              if (!(key in template)) {
                  throw new Error(`Template is missing expected section: ${key}`);
              }
          }
          EOF
